<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>To Do List</h1>
    <form id="todo-form">
        <input type="text" id="name" placeholder="Task's name" required>
        <input type="text" id="description" placeholder="Task's description" required>
        <input type="checkbox" id="done"> Done
        <input type="number" id="priority" placeholder="Priority" min="0" max="10" required>
        <button type="submit">Add</button>
    </form>
    <ul id="todo-list"></ul>
    <script src="script.js"></script>
</body>
</html>
